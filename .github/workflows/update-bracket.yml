name: Update Bracket Data

on:
  push:
    branches: [main]
  schedule:
    # Run ~3h after each possible kick-off time (UTC) so results are in
    # even after extra time + penalty shootout (~2h45m worst case).
    # 04:00 covers 01:00 KO; 04:30 covers 01:30 KO; 06:00 covers 03:00 KO.
    # 19:00–00:00 cover the 16:00–21:00 KO cluster.
    # 01:00 covers 22:00 KO; 02:30 covers 23:00 KO.
    - cron: "0 4,6,19,20,21,22,23 * * *"
    - cron: "30 4 * * *"
    - cron: "0 0,1 * * *"
    - cron: "30 2 * * *"
  workflow_dispatch: # allow manual runs

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the commit triggers downstream workflows (e.g. Pages deploy).
          # If you don't need that, remove token: and use the default GITHUB_TOKEN.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest results and update bracket.ts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-bracket.mjs

      - name: Commit updated bracket data (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/bracket.ts
          # Only commit if there's actually a change
          git diff --cached --quiet || git commit -m "chore: update bracket results [skip ci]"
          git push

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
